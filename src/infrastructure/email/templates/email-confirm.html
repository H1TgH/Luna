<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Подтверждение почты — Luna</title>
</head>
<body style="margin:0;padding:0;background-color:#06091a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#06091a;min-height:100vh;">
    <tr>
      <td align="center" valign="top" style="padding:48px 16px;">

        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">

          <tr>
            <td align="center" style="padding-bottom:32px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td valign="middle" style="padding-right:10px;">
                    <svg width="32" height="32" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
                      <path d="M56 24C42.745 24 32 34.745 32 48C32 61.255 42.745 72 56 72C49.373 72 44 61.255 44 48C44 34.745 49.373 24 56 24Z" fill="#8b7fe8"/>
                    </svg>
                  </td>
                  <td valign="middle">
                    <span style="font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:300;font-style:italic;color:#e8ecf8;letter-spacing:0.06em;line-height:1;">Luna</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:40px 40px 36px;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding-bottom:28px;">
                    <div style="width:64px;height:64px;background:linear-gradient(135deg,rgba(139,127,232,0.15),rgba(99,80,220,0.06));border:1px solid rgba(139,127,232,0.2);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;text-align:center;line-height:64px;">
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle;">
                        <path d="M20 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V6C22 4.9 21.1 4 20 4Z" stroke="#8b7fe8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M22 6L12 13L2 6" stroke="#8b7fe8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    </div>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:12px;">
                    <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:300;font-style:italic;color:#e8ecf8;letter-spacing:0.02em;line-height:1.3;">Подтвердите почту</h1>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <p style="margin:0;font-size:15px;color:rgba(107,114,156,0.75);line-height:1.6;max-width:320px;">
                      Вы зарегистрировались в Luna. Осталось подтвердить адрес электронной почты.
                    </p>
                  </td>
                </tr>

                <tr>
                  <td style="padding-bottom:32px;">
                    <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <a href="{{ confirmation_url }}"
                       style="display:inline-block;background:linear-gradient(135deg,#8b7fe8 0%,#7a6dd8 100%);color:#ffffff;font-size:15px;font-weight:500;text-decoration:none;padding:14px 36px;border-radius:12px;letter-spacing:0.02em;box-shadow:0 0 24px rgba(139,127,232,0.3);">
                      Подтвердить почту
                    </a>
                  </td>
                </tr>

                <tr>
                  <td style="padding-bottom:24px;">
                    <div style="height:1px;background:rgba(255,255,255,0.06);"></div>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:8px;">
                    <p style="margin:0;font-size:13px;color:rgba(107,114,156,0.5);line-height:1.6;">
                      Если кнопка не работает, перейдите по ссылке:
                    </p>
                  </td>
                </tr>
                <tr>
                  <td align="center">
                    <a href="{{ confirmation_url }}" style="font-size:12px;color:rgba(139,127,232,0.6);word-break:break-all;text-decoration:underline;">
                      {{ confirmation_url }}
                    </a>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-top:28px;">
              <p style="margin:0 0 8px;font-size:12px;color:rgba(107,114,156,0.35);line-height:1.6;">
                Если вы не регистрировались в Luna, просто проигнорируйте это письмо.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
