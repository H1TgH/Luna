services:
  fastapi_app:
    container_name: fastapi_app
    build:
      context: .
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--workers 4" ]
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - ".env"
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    env_file:
      - ".env"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER" ]
      interval: 5s
      timeout: 5s
      retries: 5

  pg_admin:
    container_name: pg_admin
    image: dpage/pgadmin4:8
    depends_on:
      - postgres
    env_file:
      - ".env"
    ports:
      - "5050:80"

  migrations:
    container_name: migrations
    build:
      context: .
    command: [ "alembic", "upgrade", "head" ]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ".env"
    volumes:
      - ./src:/app

  minio:
    container_name: minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ".env"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc
    env_file:
      - ".env"
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio_init.sh:/minio_init.sh
    entrypoint: /bin/sh /minio_init.sh

  frontend:
    container_name: luna_frontend
    build:
      context: ./frontend
    depends_on:
      - fastapi_app

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - frontend
      - fastapi_app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: always

  redis:
    image: redis:8.6.1-alpine
    container_name: redis
    depends_on:
      - fastapi_app

  redis_ui:
    image: redis/redisinsight:3.2.0
    container_name: redis_ui
    depends_on:
      - redis
    ports:
      - "5540:5540"
  
  celery:
    build:
      context: .
    container_name: celery
    command: celery -A infrastructure.celery_app.worker.celery worker --loglevel=info
    volumes:
      - ./src:/app
    env_file:
      - ".env"
    environment:
      PYTHONPATH: /app
    depends_on:
      - fastapi_app
      - redis

volumes:
  postgres_data:
  minio_data: