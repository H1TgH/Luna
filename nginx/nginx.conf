events {}

http {

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server fastapi_app:8000;
    }

    server {
        listen 80;
        server_name luna-sc.ru www.luna-sc.ru;

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}